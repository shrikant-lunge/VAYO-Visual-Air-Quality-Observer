<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0d1518"/>

  <!-- Outer green border glow -->
  <rect width="64" height="64" rx="14" ry="14"
        fill="none" stroke="#00e5a0" stroke-width="2.5" opacity="0.5"/>

  <!-- Leaf shape — two overlapping paths forming a leaf -->
  <!-- Main leaf body -->
  <path d="M32 10
           C32 10 48 18 48 34
           C48 44 40 52 32 54
           C24 52 16 44 16 34
           C16 18 32 10 32 10 Z"
        fill="#00e5a0" opacity="0.15"/>

  <!-- Leaf highlight (right lobe) -->
  <path d="M32 12
           C32 12 46 20 46 34
           C46 43 40 50 32 52
           L32 12 Z"
        fill="#00e5a0" opacity="0.25"/>

  <!-- Center stem -->
  <line x1="32" y1="52" x2="32" y2="18"
        stroke="#00e5a0" stroke-width="2"
        stroke-linecap="round" opacity="0.9"/>

  <!-- Left vein -->
  <path d="M32 38 Q24 32 20 26"
        fill="none" stroke="#00e5a0"
        stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Right vein -->
  <path d="M32 34 Q40 28 44 22"
        fill="none" stroke="#00e5a0"
        stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Bright leaf outline -->
  <path d="M32 10
           C32 10 48 18 48 34
           C48 44 40 52 32 54
           C24 52 16 44 16 34
           C16 18 32 10 32 10 Z"
        fill="none" stroke="#00e5a0"
        stroke-width="2" stroke-linejoin="round"/>
</svg>